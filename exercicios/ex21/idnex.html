<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { 

            /* Box-level */

            background-color: lightblue;
            height: 300px;
            width: 300px;

            border: 10px darkblue solid;

            padding: 10px;

            margin: 20px 20px 40px 20px;

          outline: 5px solid green;
        }
        a {

            /* Inline-Level */

            border: 10px, red, solid;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    <p>Paragrafos tabme são exemplo de box level, mas os <a href="">links são exemplos de caixas inline-level</a> vamos ver como tudo funciona</p>
</body>
</html>
