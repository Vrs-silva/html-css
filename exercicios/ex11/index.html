<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias Html5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir este site em varios dispositivos diferentes aumente e diminua o tamanho do seu navegador</p>

    <picture>
       <source media="(max-width: 750px)" srcset="imagens/p.png" type="image/png">
       <source media="(max-width: 1050px)" srcset="imagens/m.png" type="image/png">
       <img src="imagens/g.png" alt="Imagem flexivel">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir audios em html5</p>
    <!--MP3 WAV OGG-->

    <audio preload="metadata" autoplay controls>
        <source src="midia/Download (3) (online-audio-converter.com).mp3" type="audio/mpeg">
        <source src="midia/Download (3) (online-audio-converter.com).mp3" type="audio/WAV">
        <source src="midia/Download (3) (online-audio-converter.com).mp3" type="audio/OGG">
        
    </audio>
    <p>infelizmente seu navegador não consegue suportar audio, <a href="midia/Download (3) (online-audio-converter.com).mp3">click aqui</a> para baixar o audio</p>

    
</body>
</html>
